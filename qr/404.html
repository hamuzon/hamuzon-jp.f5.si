<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Not Found / 見つかりません</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      width: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #87ceeb 0%, #89c4f4 50%, #c7e9ff 100%);
      background-attachment: fixed;
      background-size: cover;
    }

    .wrapper {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 2.2rem 1.8rem;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.85);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    h1 {
      font-size: clamp(2.6rem, 9vw, 4.4rem);
      margin-bottom: 0.25em;
      letter-spacing: 0.04em;
    }

    p {
      font-size: 1.03rem;
      margin: 0.4em 0;
      color: #444;
      line-height: 1.6;
    }

    .subtext {
      font-size: 0.92rem;
      color: #555;
      margin-top: 0.35em;
    }

    a.back {
      display: inline-block;
      margin-top: 1.8rem;
      padding: 0.85rem 1.8rem;
      font-size: 1rem;
      background-color: #3399ff;
      background-image: linear-gradient(45deg, #3399ff, #0077e6);
      color: #fff;
      text-decoration: none;
      border-radius: 0.6rem;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(51, 153, 255, 0.3);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    a.back:hover {
      background-color: #1673e6;
      filter: brightness(1.1);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(51, 153, 255, 0.4);
    }

    footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #333;
      -webkit-user-select: none;
      user-select: none;
      text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    }

    a.link {
      color: #0056b3;
      text-decoration: none;
    }

    a.link:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .wrapper {
        padding: 1.8rem 1rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>404 - error</h1>
    <p>エラーが発生しました: 見つかりません / Not Found</p>
    <p class="subtext">Sorry, Not Found.</p>
    <a id="backLink" class="back" href="/">トップページへ戻る / Back to Home</a>

    <footer id="footer-copy"></footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (location.hostname === 'hamuzon.github.io') {
        document.getElementById('backLink').href = 'https://hamuzon.github.io/QR/';
      }
    });

    (() => {
      const footer = document.getElementById("footer-copy");
      if (!footer) {
        return;
      }

      const baseYear = 2025;
      const currentYear = new Date().getFullYear();
      const hostname = location.hostname;
      const yearString = `${baseYear}${currentYear > baseYear ? "–" + currentYear : ""}`;
      let footerHTML = "";

      if (hostname === "hamuzon.github.io") {
        footerHTML = `&copy; ${yearString} <a class="link" href="https://hamuzon.github.io" target="_blank" rel="noopener noreferrer">@hamuzon</a>`;
      } else if (hostname.includes("hamuzon-jp.f5.si")) {
        footerHTML = `&copy; ${yearString} <a class="link" href="https://hamuzon-jp.f5.si" target="_blank" rel="noopener noreferrer">@hamuzon</a>`;
      } else if (hostname.includes("hamusata.f5.si")) {
        footerHTML = `&copy; ${yearString} <a class="link" href="https://hamusata.f5.si" target="_blank" rel="noopener noreferrer">@hamusata</a>`;
      } else if (hostname.includes("qr.link-s.f5.si") || hostname.includes("hamusata.f5.si")) {
        footerHTML = `&copy; ${yearString} <a class="link" href="https://hamusata.f5.si" target="_blank" rel="noopener noreferrer">@hamusata</a>`;
      } else {
        footerHTML = `&copy; ${yearString} QR Tools`;
      }
      footer.innerHTML = footerHTML;
    })();
  </script>
</body>
</html>
