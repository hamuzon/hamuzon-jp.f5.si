<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="description" content="タスク管理をウェブサイトで使えるタスクボードツールです。Todoや進行中、完了した作業などをわかりやすく管理できます。">
  <meta name="keywords" content="タスク管理, タスクボード, かんばん, ToDoリスト, プロジェクト管理, 進捗管理, Task Management, Task Board, Kanban, ToDo List, Todo, Project Management, Progress Management, Web App, Tool">
  <link rel="canonical" href="https://hamuzon-jp.f5.si/task-board/">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta property="og:title" content="Task Board">
  <meta property="og:description" content="タスク管理をウェブサイトで使えるタスクボードツールです。Todoや進行中、完了した作業などをわかりやすく管理できます。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hamuzon-jp.f5.si/task-board/">
  <meta property="og:site_name" content="Task Board">
  <title>タスクボード - Task Board</title>
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>タスクボード - Task Board</h1>
    <div class="controls">
      <button id="add-group-btn">＋ グループ追加</button>
      <button id="save-btn">💾 保存</button>
      <input type="file" id="load-input" hidden />
      <button id="load-btn">📂 読み込み</button>
      <button id="clear-storage-btn" title="ローカルストレージクリア">🗑 ローカル消去</button>
    </div>
  </header>
  <main>
    <div class="progress-overall"><div></div><span>0%</span></div>
    <div class="groups" id="groups-container" aria-live="polite"></div>
  </main>
  <script src="script.js" defer></script>
</body>
</html>
