<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID Generator / UUIDジェネレーター</title>

    <style>
        :root {
            --sky-bg: #bae6fd;
            --sky-accent: #0ea5e9;
            --glass-white: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #0c4a6e;
            --text-sub: #334155;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: system-ui, sans-serif;
            background: var(--sky-bg);
            background-image:
                radial-gradient(at 0% 0%, #e0f2fe 0%, transparent 50%),
                radial-gradient(at 100% 0%, #7dd3fc 0%, transparent 50%),
                radial-gradient(at 50% 100%, #38bdf8 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .card {
            width: 100%;
            max-width: 520px;
            padding: 40px;
            background: var(--glass-white);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            text-align: center;
            box-shadow: 0 20px 40px rgba(12, 74, 110, 0.1);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        .sub {
            color: var(--text-sub);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .jp {
            display: block;
            margin-top: 6px;
            font-size: 0.7em;
            font-weight: 500;
            opacity: 0.85;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: block;
            padding: 16px 24px;
            border-radius: 100px;
            background: var(--sky-accent);
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: .3s ease;
            box-shadow: 0 8px 20px rgba(14,165,233,.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #0284c7;
        }

        @media (max-width:480px) {
            .card {
                padding: 32px 20px;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .sub {
                margin-bottom: 32px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>
        UUID Generator
        <span class="jp">UUIDジェネレーター</span>
    </h1>

    <p class="sub">
        Choose a version to generate.
        <span class="jp">生成するバージョンを選択してください。</span>
    </p>

    <div class="actions">
        <a href="UUIDV4.html" class="btn">UUID v4</a>
        <a href="UUIDV7.html" class="btn">UUID v7</a>
    </div>
</div>

</body>
</html>
